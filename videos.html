<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Locker-Room | Videos - Kit Previews & Highlights</title>
<link rel="stylesheet" href="style.css">

<style>
/* 🔥 BACKGROUND SLIDER */
.locker-bg {
    position: fixed;
    inset: 0;
    z-index: -1;
    background-size: cover;
    background-position: center;
    animation: bgSlide 45s infinite;
}
@keyframes bgSlide {
    0%{background-image:url('locker1.jpg');}
    11%{background-image:url('locker2.jpg');}
    22%{background-image:url('locker3.jpg');}
    33%{background-image:url('locker4.jpg');}
    44%{background-image:url('locker5.jpg');}
    55%{background-image:url('locker6.jpg');}
    66%{background-image:url('locker7.jpg');}
    77%{background-image:url('locker8.jpg');}
    88%{background-image:url('stadium.jpg');}
    100%{background-image:url('locker1.jpg');}
}
body::before {
    content:"";
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.6);
    z-index:-1;
}

/* 🔥 NEW LAYOUT */
.video-layout {
    display: grid;
    grid-template-columns: 1fr 3fr 1fr;
    gap: 1.5rem;
    align-items: start;
}

/* CENTER VIDEOS */
.video-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1.5rem;
}

/* SIDE VIDEOS */
.side-video {
    background: #1f2a33;
    border-radius: 20px;
    overflow: hidden;
    border: 2px solid var(--locker-accent);
}
.side-video video {
    width: 100%;
    aspect-ratio: 9/16;
    object-fit: cover;
}

/* ORIGINAL VIDEO CARD */
.video-card {
    background: #1f2a33;
    border-radius: 28px;
    overflow: hidden;
    border: 2px solid var(--locker-accent);
}
.video-card video {
    width: 100%;
    aspect-ratio: 9 / 16;
    object-fit: cover;
}
.video-info {
    padding: 1rem;
    text-align: center;
}

/* MOBILE FIX */
@media(max-width:900px){
    .video-layout {
        grid-template-columns: 1fr;
    }
    .video-grid {
        grid-template-columns: 1fr;
    }
}
</style>
</head>

<body>
<div class="locker-bg"></div>

<div class="menu-bar">
    <a href="index.html">🏠 HOME</a>
    <a href="shop.html">🛍️ SHOP</a>
    <a href="size.html">📏 SIZE GUIDE</a>
    <a href="videos.html" class="active">🎬 VIDEOS</a>
    <a href="contact.html">📞 CONTACT</a>
</div>

<div class="page-content">
<h2 style="text-align:center;">🎬 2026 KIT PREVIEWS</h2>

<div class="video-layout">

    <!-- LEFT SIDE VIDEO -->
    <div class="side-video">
        <video autoplay muted loop playsinline>
            <source src="matchday-left.mp4" type="video/mp4">
        </video>
    </div>

    <!-- CENTER MAIN VIDEOS -->
    <div class="video-grid">

        <div class="video-card">
            <video controls autoplay muted loop playsinline>
                <source src="country jersey.mp4" type="video/mp4">
            </video>
            <div class="video-info">
                🇦🇷 COUNTRY JERSEY 2026
            </div>
        </div>

        <div class="video-card">
            <video controls autoplay muted loop playsinline>
                <source src="country jersey 2.mp4" type="video/mp4">
            </video>
            <div class="video-info">
                🌍 WORLD CUP 2026
            </div>
        </div>

        <div class="video-card">
            <video controls autoplay muted loop playsinline>
                <source src="club jersey.mp4" type="video/mp4">
            </video>
            <div class="video-info">
                ⚽ CLUB COLLECTION
            </div>
        </div>

    </div>

    <!-- RIGHT SIDE VIDEO -->
    <div class="side-video">
        <video autoplay muted loop playsinline>
            <source src="matchday-right.mp4" type="video/mp4">
        </video>
    </div>

</div>

</div>

<footer class="footer-locker">
⚽ THE LOCKER-ROOM ⚽
</footer>

</body>
</html>
