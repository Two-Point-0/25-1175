<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Locker-Room | Size Guide</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
    font-family: 'Inter', sans-serif;
    margin: 0;
    background: #111;
    color: #eee;
}

/* MENU */
.menu-bar {
    display: flex;
    justify-content: center;
    gap: 15px;
    padding: 15px;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(6px);
    position: sticky;
    top: 0;
}

.menu-bar a {
    color: white;
    text-decoration: none;
    font-weight: bold;
    padding: 8px 16px;
    border-radius: 20px;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: 0.3s;
}

.menu-bar a:hover {
    background: rgba(230,177,126,0.8);
    color: black;
}

/* HERO */
.hero {
    display: flex;
    justify-content: center;
    margin: 30px 0;
}

.hero-box {
    padding: 15px 25px;
    background: rgba(0,0,0,0.4);
    border-radius: 25px;
    backdrop-filter: blur(6px);
    text-align: center;
}

.hero-box h1 {
    color: #e6b17e;
}

/* SIZE CONTAINER */
.size-container {
    text-align: center;
    padding: 20px;
}

/* IMAGE */
.size-container img {
    width: 90%;
    max-width: 500px;
    border-radius: 15px;
}

/* SIZE BUTTONS */
.size-buttons {
    margin: 20px 0;
}

.size-buttons button {
    padding: 10px 15px;
    margin: 5px;
    border: none;
    border-radius: 20px;
    background: rgba(0,0,0,0.5);
    color: white;
    cursor: pointer;
    transition: 0.3s;
    font-weight: bold;
}

.size-buttons button:hover,
.size-buttons button.active {
    background: #e6b17e;
    color: black;
}

/* SIZE INFO */
.size-info {
    margin-top: 20px;
    background: rgba(0,0,0,0.4);
    display: inline-block;
    padding: 20px;
    border-radius: 15px;
    backdrop-filter: blur(6px);
}

/* FOOTER */
.footer-locker {
    text-align: center;
    background: rgba(0,0,0,0.4);
    padding: 15px;
    margin-top: 40px;
}
</style>
</head>

<body>

<!-- MENU -->
<div class="menu-bar">
    <a href="index.html"><i class="fas fa-house"></i> Home</a>
    <a href="shop.html"><i class="fas fa-bag-shopping"></i> Shop</a>
    <a href="size.html"><i class="fas fa-ruler"></i> Size Guide</a>
    <a href="videos.html"><i class="fas fa-video"></i> Videos</a>
    <a href="contact.html"><i class="fas fa-phone"></i> Contact</a>
</div>

<!-- HERO -->
<div class="hero">
    <div class="hero-box">
        <h1>Size Guide</h1>
        <p>Find your perfect fit ⚽</p>
    </div>
</div>

<!-- CONTENT -->
<div class="size-container">

    <img src="size-guide.jpg" alt="Size Guide">

    <!-- SIZE BUTTONS -->
    <div class="size-buttons">
        <button onclick="selectSize('S')" id="btn-S">S</button>
        <button onclick="selectSize('M')" id="btn-M">M</button>
        <button onclick="selectSize('L')" id="btn-L">L</button>
        <button onclick="selectSize('XL')" id="btn-XL">XL</button>
    </div>

    <!-- SIZE INFO -->
    <div class="size-info" id="sizeInfo">
        Select a size to view measurements
    </div>

</div>

<!-- FOOTER -->
<div class="footer-locker">
⚽ THE LOCKER-ROOM - OFFICIAL UEFA MERCHANDISE PARTNER ⚽<br>
© 2026 The Locker-Room | Nairobi, Kenya
</div>

<script>
const sizes = {
    S: "Chest: 88-94 cm<br>Waist: 76-81 cm<br>Height: 165-170 cm",
    M: "Chest: 95-102 cm<br>Waist: 82-88 cm<br>Height: 170-178 cm",
    L: "Chest: 103-110 cm<br>Waist: 89-96 cm<br>Height: 178-185 cm",
    XL: "Chest: 111-118 cm<br>Waist: 97-104 cm<br>Height: 185-192 cm"
};

function selectSize(size) {
    document.getElementById("sizeInfo").innerHTML = sizes[size];

    // Highlight active button
    document.querySelectorAll(".size-buttons button").forEach(btn => {
        btn.classList.remove("active");
    });
    document.getElementById("btn-" + size).classList.add("active");
}
</script>

</body>
</html>
