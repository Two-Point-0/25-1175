<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Locker-Room | Shop</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:'Inter',sans-serif; }
body { background:#111; color:white; }
.menu-bar { display:flex; justify-content:center; gap:25px; padding:20px 0; background:rgba(20,20,20,0.9); position:sticky; top:0; z-index:10; }
.menu-bar a { color:white; text-decoration:none; font-weight:600; padding:10px 20px; border-radius:25px; display:flex; align-items:center; gap:8px; transition:0.3s; background:rgba(255,255,255,0.05); }
.menu-bar a:hover { background:#e6b17e; color:black; }

.section { margin:40px 5%; }
.section h2 { color:#e6b17e; margin-bottom:15px; }

.row { display:flex; align-items:center; gap:10px; }
.container { display:flex; overflow-x:auto; gap:15px; padding:10px; scroll-behavior:smooth; scrollbar-width:none; -ms-overflow-style:none; }
.container::-webkit-scrollbar { display:none; }

.card { width:200px; background:rgba(255,255,255,0.05); border-radius:15px; padding:10px; text-align:center; transition:0.3s; flex-shrink:0; position:relative; }
.card:hover { transform:scale(1.05); }
.card img { width:100%; border-radius:10px; height:220px; object-fit:cover; }
.card h4 { margin:8px 0; font-size:0.9rem; }
.price { color:#f3b44f; font-weight:bold; }
.btn { margin-top:6px; padding:8px 12px; border:none; border-radius:25px; background:linear-gradient(135deg,#e6b17e,#f3c17f); cursor:pointer; transition:0.2s; font-weight:600; position:relative; z-index:1; }
.btn:active { transform:scale(0.9); }

.scroll-btn { width:40px; height:40px; border:none; border-radius:50%; background:#e6b17e; color:black; font-size:1.2rem; cursor:pointer; transition:0.2s; flex-shrink:0; }
.scroll-btn:hover { background:#f3c17f; }

.cart-popup { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:#222; padding:30px; border-radius:15px; width:350px; max-width:90%; display:none; z-index:100; box-shadow:0 5px 25px rgba(0,0,0,0.5); }
.cart-popup h3 { margin-bottom:15px; text-align:center; color:#e6b17e; }
.cart-item { display:flex; justify-content:space-between; margin:10px 0; border-bottom:1px solid rgba(255,255,255,0.1); padding-bottom:5px; font-size:0.9rem; }
.total { margin-top:15px; font-weight:bold; font-size:1.1rem; text-align:right; }
.close-cart { position:absolute; top:10px; right:15px; cursor:pointer; font-size:1.2rem; color:#f3b44f; }
.checkout { margin-top:15px; display:flex; justify-content:space-between; gap:10px; }
.checkout button { flex:1; padding:10px; border:none; border-radius:20px; font-weight:600; cursor:pointer; transition:0.3s; }
.checkout .mpesa { background:#00a859; color:white; }
.checkout .visa { background:#1a1f71; color:white; }
.checkout button:hover { opacity:0.85; }

/* FLYING IMAGE EFFECT */
.fly-img { position:absolute; width:80px; height:80px; border-radius:10px; z-index:500; pointer-events:none; transition:all 0.8s ease-in-out; }
</style>
</head>
<body>

<!-- MENU -->
<div class="menu-bar">
<a href="index.html"><i class="fas fa-home"></i>Home</a>
<a href="shop.html"><i class="fas fa-bag-shopping"></i>Shop</a>
<a href="video.html"><i class="fas fa-video"></i>Video</a>
<a href="size.html"><i class="fas fa-ruler"></i>Size Guide</a>
<a href="contact.html"><i class="fas fa-envelope"></i>Contact</a>
</div>

<!-- ================= SHIRTS ================= -->
<div class="section">
<h2>Shirts</h2>
<div class="row">
<button class="scroll-btn" onclick="scrollRow('shirts',-300)">‹</button>
<div class="container" id="shirts"></div>
<button class="scroll-btn" onclick="scrollRow('shirts',300)">›</button>
</div>
</div>

<!-- ================= SHORTS ================= -->
<div class="section">
<h2>Shorts</h2>
<div class="row">
<button class="scroll-btn" onclick="scrollRow('shorts',-300)">‹</button>
<div class="container" id="shorts"></div>
<button class="scroll-btn" onclick="scrollRow('shorts',300)">›</button>
</div>
</div>

<!-- ================= BOOTS ================= -->
<div class="section">
<h2>Boots</h2>
<div class="row">
<button class="scroll-btn" onclick="scrollRow('boots',-300)">‹</button>
<div class="container" id="boots"></div>
<button class="scroll-btn" onclick="scrollRow('boots',300)">›</button>
</div>
</div>

<!-- ================= MEMORABILIA ================= -->
<div class="section">
<h2>Memorabilia</h2>
<div class="row">
<button class="scroll-btn" onclick="scrollRow('mem',-300)">‹</button>
<div class="container" id="mem"></div>
<button class="scroll-btn" onclick="scrollRow('mem',300)">›</button>
</div>
</div>

<!-- CART POPUP -->
<div class="cart-popup" id="cartPopup">
<span class="close-cart" onclick="toggleCart()">✖</span>
<h3>🛒 Your Cart</h3>
<div id="items"></div>
<p class="total">Total: €<span id="total">0</span></p>
<div class="checkout">
<button class="mpesa">Pay with Mpesa</button>
<button class="visa">Pay with Visa</button>
</div>
</div>

<script>
// ================= DATA (ALL 54 IMAGES) =================
const shirts = [
"barca.png","madrid.avif","liverpool.avif","city.avif","arsenal.avif","chelsea.avif",
"psg.avif","juventus.avif","AC Milan.jpg","inter.avif","napoli.webp","bayern.avif",
"borussia.avif","RB.avif","leverkusen.avif","athletico.jpg","sevila.jpg","olympique.avif",
"lyon.avif","monaco.avif"
];

const shorts = [
"barcelona shorts.avif","madrid shorts.webp","liverpool shorts.avif","city shorts.avif",
"arsenal shorts.webp","chelsea shorts.avif","psg shorts.avif","juventus shorts.avif",
"AcMilan shorts.avif","inter shorts.avif","napoli shorts.webp","bayern shorts.avif",
"borussia shorts.avif","RB shorts.avif","leverkusen shorts.avif","athletico shorts.webp",
"sevila short.avif","olympique shorts.avif","lyon shorts.avif","monaco shorts.avif"
];

const boots = [
"f50 elite.jpg","pedri predator.jpg","yamal f50.jpg","jude.jpg","copa pure 3.jpg",
"x speedflow.jpg","mecurial.jpg","neymar puma.jpg"
];

const mem = [
"pedri signed.jpg","pedri 2.jpg","ms1.webp","ms2.jpg","yamal card.jpg","yamal card 2.jpg"
];

// ================= CREATE ITEMS =================
function loadItems(list,id,price){
    let container=document.getElementById(id);
    list.forEach(img=>{
        container.innerHTML+=`
        <div class="card">
            <img src="${img}">
            <h4>${img.split('.')[0]}</h4>
            <p class="price">€${price}</p>
            <button class="btn" onclick="addToCartFly(this,'${img}',${price})">Add to Cart</button>
        </div>`;
    });
}
loadItems(shirts,"shirts",80);
loadItems(shorts,"shorts",50);
loadItems(boots,"boots",130);
loadItems(mem,"mem",250);

// ================= SCROLL =================
function scrollRow(id,amt){ document.getElementById(id).scrollBy({left:amt,behavior:'smooth'}); }

// ================= CART =================
let cart=[];
function addToCartFly(button,imgSrc,price){
    const img = button.parentElement.querySelector("img");
    const flyImg = img.cloneNode(true);
    flyImg.classList.add('fly-img');
    const rect = img.getBoundingClientRect();
    flyImg.style.top = rect.top + "px";
    flyImg.style.left = rect.left + "px";
    document.body.appendChild(flyImg);

    const popup = document.getElementById("cartPopup");
    const popupRect = popup.getBoundingClientRect();
    setTimeout(()=>{
        flyImg.style.top = (popupRect.top + popupRect.height/2 - 40) + "px";
        flyImg.style.left = (popupRect.left + popupRect.width/2 - 40) + "px";
        flyImg.style.width = "80px";
        flyImg.style.height = "80px";
    },10);

    setTimeout(()=>{
        flyImg.remove();
        addToCart(imgSrc,price);
    },800);
}

function addToCart(name,price){
    cart.push({name,price});
    renderCart();
    showCartPopup();
}

function renderCart(){
    let html='',total=0;
    cart.forEach(i=>{ total+=i.price; html+=`<div class="cart-item">${i.name} €${i.price}</div>`; });
    document.getElementById("items").innerHTML=html;
    document.getElementById("total").innerText=total;
}

function toggleCart(){
    let popup=document.getElementById("cartPopup");
    popup.style.display=(popup.style.display==='block') ? 'none' : 'block';
}

function showCartPopup(){
    let popup=document.getElementById("cartPopup");
    popup.style.display='block';
}
</script>

</body>
</html>
