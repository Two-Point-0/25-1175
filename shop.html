<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Locker-Room | Shop</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
    margin:0;
    font-family:'Inter', sans-serif;
    color:white;
}

/* BACKGROUND */
.bg div {
    position:fixed;
    width:100%;
    height:100%;
    background-size:cover;
    background-position:center;
    opacity:0;
    transition:1.5s;
    z-index:-2;
}
.bg .active {opacity:1;}

.overlay {
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
    z-index:-1;
}

/* MENU */
.menu-bar {
    display:flex;
    justify-content:center;
    gap:15px;
    padding:15px;
}
.menu-bar a {
    color:white;
    text-decoration:none;
    padding:8px 16px;
    border-radius:20px;
    background:rgba(0,0,0,0.5);
}

/* SECTION */
.section {margin:40px 20px;}
.section h2 {color:#e6b17e;}

/* ROW */
.row {display:flex; align-items:center;}

.container {
    display:flex;
    overflow-x:auto;
    gap:15px;
    padding:10px;
    scroll-behavior:smooth;
}
.container::-webkit-scrollbar {display:none;}

.card {
    min-width:180px;
    background:rgba(0,0,0,0.6);
    border-radius:15px;
    padding:10px;
    text-align:center;
}
.card img {width:100%; border-radius:10px;}

.price {color:#f3b44f; font-weight:bold;}

.btn {
    margin-top:6px;
    padding:8px;
    border:none;
    border-radius:20px;
    background:#e6b17e;
    cursor:pointer;
}
.btn:hover {transform:scale(1.1);}

/* SCROLL BUTTON */
.scroll-btn {
    width:40px;
    height:40px;
    border-radius:50%;
    border:none;
    background:#e6b17e;
    cursor:pointer;
}

/* CART */
#cart {
    position:fixed;
    right:0;
    top:0;
    width:300px;
    height:100%;
    background:black;
    padding:15px;
    transform:translateX(100%);
    transition:0.3s;
}
#cart.show {transform:translateX(0);}
</style>
</head>

<body>

<div class="bg">
<div class="active" style="background-image:url('locker1.jpg')"></div>
<div style="background-image:url('locker2.jpg')"></div>
<div style="background-image:url('locker3.jpg')"></div>
<div style="background-image:url('locker4.jpg')"></div>
</div>
<div class="overlay"></div>

<!-- MENU -->
<div class="menu-bar">
<a href="index.html">Home</a>
<a href="shop.html">Shop</a>
<a href="size.html">Size</a>
<a href="#" onclick="toggleCart()">Cart (<span id="count">0</span>)</a>
</div>

<!-- ================= SHIRTS ================= -->
<div class="section">
<h2>Shirts</h2>
<div class="row">
<button class="scroll-btn" onclick="scrollRow('shirts',-300)">‹</button>

<div class="container" id="shirts">

<!-- ALL SHIRTS -->
<script>
const shirts = [
"barca.png","madrid.avif","liverpool.avif","city.avif","arsenal.avif",
"chelsea.avif","psg.avif","juventus.avif","AC Milan.jpg","inter.avif",
"napoli.webp","bayern.avif","borussia.avif","RB.avif","leverkusen.avif",
"athletico.jpg","sevila.jpg","olympique.avif","lyon.avif","monaco.avif"
];
shirts.forEach(img=>{
document.write(`
<div class="card">
<img src="${img}">
<h4>${img.split('.')[0]}</h4>
<p class="price">€80</p>
<button class="btn" onclick="add('${img}',80)">Add</button>
</div>
`);
});
</script>

</div>
<button class="scroll-btn" onclick="scrollRow('shirts',300)">›</button>
</div>
</div>

<!-- CART -->
<div id="cart">
<h3>Cart</h3>
<div id="items"></div>
<p>Total: €<span id="total">0</span></p>
</div>

<script>
function scrollRow(id, amt){
document.getElementById(id).scrollBy({left:amt, behavior:'smooth'});
}

let cart=[];
function add(name,price){
cart.push({name,price});
render();
}
function render(){
let html='',total=0;
cart.forEach(i=>{
total+=i.price;
html+=`<div>${i.name} €${i.price}</div>`;
});
document.getElementById('items').innerHTML=html;
document.getElementById('total').innerText=total;
document.getElementById('count').innerText=cart.length;
}
function toggleCart(){
document.getElementById('cart').classList.toggle('show');
}

/* background */
let slides=document.querySelectorAll('.bg div');
let i=0;
setInterval(()=>{
slides[i].classList.remove('active');
i=(i+1)%slides.length;
slides[i].classList.add('active');
},4000);
</script>

</body>
</html>
