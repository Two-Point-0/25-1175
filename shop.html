<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Locker-Room | Shop</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:#0e0e0e;color:#fff;overflow-x:hidden;}

/* MENU BAR (MATCHED STYLE) */
.menu-bar{
display:flex;
justify-content:center;
gap:15px;
padding:15px;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(8px);
position:sticky;
top:0;
z-index:100;
}
.menu-bar a{
color:white;
text-decoration:none;
font-weight:bold;
padding:8px 16px;
border-radius:20px;
display:flex;
align-items:center;
gap:6px;
transition:0.3s;
}
.menu-bar a:hover{
background:#e6b17e;
color:black;
}

/* HERO */
.hero{text-align:center;margin:30px 0;}
.hero h1{color:#e6b17e;font-size:2.5rem;}

/* SECTION */
.section-title{text-align:center;margin:30px 0;color:#e6b17e;}
.scroll-wrapper{display:flex;align-items:center;gap:10px;padding:0 20px;}
.scroll-container{
display:flex;
overflow-x:auto;
gap:15px;
scroll-behavior:smooth;
padding:10px;
}
.scroll-container::-webkit-scrollbar{display:none;}

.scroll-item{
min-width:200px;
background:#1a1a1a;
border-radius:15px;
padding:10px;
text-align:center;
transition:0.3s;
}
.scroll-item:hover{transform:translateY(-5px);}
.scroll-item img{width:100%;border-radius:10px;}

.add-btn{
margin-top:8px;
padding:8px;
border:none;
background:#e6b17e;
border-radius:20px;
cursor:pointer;
font-weight:bold;
transition:0.3s;
}
.add-btn:hover{background:#f3c17f;}

.scroll-btn{
background:#e6b17e;
border:none;
border-radius:50%;
width:40px;height:40px;
cursor:pointer;
}

/* CART POPUP */
.cart-popup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%) scale(0);
background:#111;
padding:20px;
border-radius:20px;
width:320px;
z-index:200;
transition:0.3s;
}
.cart-popup.show{transform:translate(-50%,-50%) scale(1);}

.cart-items{max-height:200px;overflow:auto;margin:10px 0;}
.cart-item{display:flex;justify-content:space-between;margin-bottom:8px;}

.checkout-btn{
width:100%;
padding:10px;
background:#e6b17e;
border:none;
border-radius:10px;
cursor:pointer;
margin-top:10px;
}

/* FOOTER */
.footer-locker{
text-align:center;
margin-top:30px;
padding:15px;
background:#000;
}
</style>
</head>

<body>

<!-- MENU -->
<div class="menu-bar">
<a href="index.html"><i class="fas fa-house"></i> Home</a>
<a href="shop.html"><i class="fas fa-bag-shopping"></i> Shop</a>
<a href="size.html"><i class="fas fa-ruler"></i> Size Guide</a>
<a href="videos.html"><i class="fas fa-video"></i> Videos</a>
<a href="contact.html"><i class="fas fa-phone"></i> Contact</a>
</div>

<div class="hero">
<h1>⚡ THE LOCKER-ROOM ⚡</h1>
<p>Shop Elite Football Gear</p>
</div>

<!-- SHIRTS FIRST -->
<h2 class="section-title">Shirts</h2>
<div class="scroll-wrapper">
<button class="scroll-btn" onclick="scrollRow('shirts',-300)">‹</button>
<div id="shirts" class="scroll-container">

<!-- ALL SHIRTS -->
<div class="scroll-item"><img src="barca.png"><p>Barcelona</p><button class="add-btn" onclick="addToCart('Barcelona Shirt',80)">Add</button></div>
<div class="scroll-item"><img src="madrid.avif"><p>Madrid</p><button class="add-btn" onclick="addToCart('Madrid Shirt',80)">Add</button></div>
<div class="scroll-item"><img src="liverpool.avif"><p>Liverpool</p><button class="add-btn" onclick="addToCart('Liverpool Shirt',80)">Add</button></div>
<div class="scroll-item"><img src="city.avif"><p>City</p><button class="add-btn" onclick="addToCart('City Shirt',80)">Add</button></div>
<div class="scroll-item"><img src="arsenal.avif"><p>Arsenal</p><button class="add-btn" onclick="addToCart('Arsenal Shirt',80)">Add</button></div>
<div class="scroll-item"><img src="chelsea.avif"><p>Chelsea</p><button class="add-btn" onclick="addToCart('Chelsea Shirt',80)">Add</button></div>
<div class="scroll-item"><img src="psg.avif"><p>PSG</p><button class="add-btn" onclick="addToCart('PSG Shirt',80)">Add</button></div>
<div class="scroll-item"><img src="juventus.avif"><p>Juventus</p><button class="add-btn" onclick="addToCart('Juventus Shirt',80)">Add</button></div>
<div class="scroll-item"><img src="inter.avif"><p>Inter</p><button class="add-btn" onclick="addToCart('Inter Shirt',80)">Add</button></div>

</div>
<button class="scroll-btn" onclick="scrollRow('shirts',300)">›</button>
</div>

<!-- SHORTS -->
<h2 class="section-title">Shorts</h2>
<div class="scroll-wrapper">
<button class="scroll-btn" onclick="scrollRow('shorts',-300)">‹</button>
<div id="shorts" class="scroll-container">

<div class="scroll-item"><img src="barcelona shorts.avif"><p>Barcelona</p><button class="add-btn" onclick="addToCart('Barcelona Shorts',50)">Add</button></div>
<div class="scroll-item"><img src="madrid shorts.webp"><p>Madrid</p><button class="add-btn" onclick="addToCart('Madrid Shorts',50)">Add</button></div>
<div class="scroll-item"><img src="liverpool shorts.avif"><p>Liverpool</p><button class="add-btn" onclick="addToCart('Liverpool Shorts',50)">Add</button></div>

</div>
<button class="scroll-btn" onclick="scrollRow('shorts',300)">›</button>
</div>

<!-- BOOTS -->
<h2 class="section-title">Boots</h2>
<div class="scroll-wrapper">
<button class="scroll-btn" onclick="scrollRow('boots',-300)">‹</button>
<div id="boots" class="scroll-container">

<div class="scroll-item"><img src="f50 elite.jpg"><p>F50 Elite</p><button class="add-btn" onclick="addToCart('F50',120)">Add</button></div>
<div class="scroll-item"><img src="copa pure 3.jpg"><p>Copa</p><button class="add-btn" onclick="addToCart('Copa',140)">Add</button></div>

</div>
<button class="scroll-btn" onclick="scrollRow('boots',300)">›</button>
</div>

<!-- CART -->
<div id="cart" class="cart-popup">
<h3>Your Cart</h3>
<div class="cart-items"></div>
<p>Total: €<span id="total">0</span></p>
<button class="checkout-btn" onclick="checkout()">Checkout</button>
</div>

<!-- FOOTER -->
<div class="footer-locker">
⚽ THE LOCKER-ROOM ⚽<br>
© 2026 | Nairobi, Kenya
</div>

<script>
let cart=[];

function scrollRow(id,amount){
document.getElementById(id).scrollBy({left:amount,behavior:'smooth'});
}

function addToCart(name,price){
cart.push({name,price});
renderCart();
document.getElementById('cart').classList.add('show');
}

function renderCart(){
let container=document.querySelector('.cart-items');
container.innerHTML='';
let total=0;

cart.forEach((item,index)=>{
total+=item.price;
container.innerHTML+=`
<div class="cart-item">
${item.name} €${item.price}
<button onclick="removeItem(${index})">X</button>
</div>`;
});

document.getElementById('total').innerText=total;
}

function removeItem(i){
cart.splice(i,1);
renderCart();
}

function checkout(){
if(cart.length===0){
alert("Cart empty!");
return;
}
alert("Payment Successful ✅");
cart=[];
renderCart();
document.getElementById('cart').classList.remove('show');
}
</script>

</body>
</html>
