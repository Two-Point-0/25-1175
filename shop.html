<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Locker-Room | Shop</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:'Inter',sans-serif; }
body { background:#111; color:white; overflow-x:hidden; }
.menu-bar { display:flex; justify-content:center; gap:25px; padding:20px 0; background:rgba(20,20,20,0.9); position:sticky; top:0; z-index:10; }
.menu-bar a { color:white; text-decoration:none; font-weight:600; padding:10px 20px; border-radius:25px; display:flex; align-items:center; gap:8px; transition:0.3s; background:rgba(255,255,255,0.05); }
.menu-bar a:hover { background:#e6b17e; color:black; }
.section { margin:50px 20px; }
.section h2 { color:#e6b17e; margin-bottom:15px; }
.row { display:flex; align-items:center; gap:10px; }
.container { display:flex; overflow-x:auto; gap:15px; padding:10px; scroll-behavior:smooth; padding-bottom:15px; }
.container::-webkit-scrollbar { height:8px; }
.container::-webkit-scrollbar-thumb { background:#e6b17e; border-radius:5px; }
.container::-webkit-scrollbar-track { background:rgba(255,255,255,0.05); }
.card { min-width:180px; background:rgba(255,255,255,0.05); border-radius:15px; padding:10px; text-align:center; transition:0.3s; flex-shrink:0; }
.card:hover { transform:scale(1.05); }
.card img { width:100%; border-radius:10px; }
.card h4 { margin:8px 0; font-size:0.9rem; }
.price { color:#f3b44f; font-weight:bold; }
.btn { margin-top:6px; padding:8px 12px; border:none; border-radius:25px; background:linear-gradient(135deg,#e6b17e,#f3c17f); cursor:pointer; transition:0.2s; font-weight:600; }
.btn:active { transform:scale(0.9); }
.cart-float { position:fixed; bottom:20px; right:20px; background:#e6b17e; color:black; width:60px;height:60px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:1.4rem; cursor:pointer; box-shadow:0 5px 20px rgba(0,0,0,0.5); z-index:20; }
.cart-count { position:absolute; top:-5px; right:-5px; background:red; color:white; border-radius:50%; padding:4px 7px; font-size:0.7rem; }
#cartPanel { position:fixed; right:-350px; top:0; width:350px; height:100%; background:#111; padding:20px; transition:0.3s; overflow-y:auto; z-index:15; }
#cartPanel.show { right:0; }
#cartPanel h3 { margin-bottom:15px; }
.cart-item { display:flex; justify-content:space-between; margin:10px 0; border-bottom:1px solid rgba(255,255,255,0.1); padding-bottom:5px; }
.total { margin-top:15px; font-weight:bold; font-size:1.1rem; }
.scroll-btn { width:40px; height:40px; border:none; border-radius:50%; background:#e6b17e; color:black; font-size:1.2rem; cursor:pointer; transition:0.2s; flex-shrink:0; }
.scroll-btn:hover { background:#f3c17f; }
</style>
</head>

<body>

<!-- MENU -->
<div class="menu-bar">
<a href="index.html"><i class="fas fa-home"></i>Home</a>
<a href="shop.html"><i class="fas fa-shirt"></i>Shop</a>
<a href="size.html"><i class="fas fa-ruler"></i>Size Guide</a>
<a href="contact.html"><i class="fas fa-envelope"></i>Contact</a>
</div>

<!-- ================= SHIRTS ================= -->
<div class="section">
<h2>Shirts</h2>
<div class="row">
<button class="scroll-btn" onclick="scrollRow('shirts',-300)">‹</button>
<div class="container" id="shirts"></div>
<button class="scroll-btn" onclick="scrollRow('shirts',300)">›</button>
</div>
</div>

<!-- ================= SHORTS ================= -->
<div class="section">
<h2>Shorts</h2>
<div class="row">
<button class="scroll-btn" onclick="scrollRow('shorts',-300)">‹</button>
<div class="container" id="shorts"></div>
<button class="scroll-btn" onclick="scrollRow('shorts',300)">›</button>
</div>
</div>

<!-- ================= BOOTS ================= -->
<div class="section">
<h2>Boots</h2>
<div class="row">
<button class="scroll-btn" onclick="scrollRow('boots',-300)">‹</button>
<div class="container" id="boots"></div>
<button class="scroll-btn" onclick="scrollRow('boots',300)">›</button>
</div>
</div>

<!-- ================= MEMORABILIA ================= -->
<div class="section">
<h2>Memorabilia</h2>
<div class="row">
<button class="scroll-btn" onclick="scrollRow('mem',-300)">‹</button>
<div class="container" id="mem"></div>
<button class="scroll-btn" onclick="scrollRow('mem',300)">›</button>
</div>
</div>

<!-- FLOATING CART -->
<div class="cart-float" onclick="toggleCart()">
<i class="fas fa-shopping-cart"></i>
<div class="cart-count" id="count">0</div>
</div>

<!-- CART PANEL -->
<div id="cartPanel">
<h3>🛒 Your Cart</h3>
<div id="items"></div>
<p class="total">Total: €<span id="total">0</span></p>
</div>

<script>
// ================= DATA (ALL 54 IMAGES) =================
const shirts = [
"barca.png","madrid.avif","liverpool.avif","city.avif","arsenal.avif","chelsea.avif",
"psg.avif","juventus.avif","AC Milan.jpg","inter.avif","napoli.webp","bayern.avif",
"borussia.avif","RB.avif","leverkusen.avif","athletico.jpg","sevila.jpg","olympique.avif",
"lyon.avif","monaco.avif"
];

const shorts = [
"barcelona shorts.avif","madrid shorts.webp","liverpool shorts.avif","city shorts.avif",
"arsenal shorts.webp","chelsea shorts.avif","psg shorts.avif","juventus shorts.avif",
"AcMilan shorts.avif","inter shorts.avif","napoli shorts.webp","bayern shorts.avif",
"borussia shorts.avif","RB shorts.avif","leverkusen shorts.avif","athletico shorts.webp",
"sevila short.avif","olympique shorts.avif","lyon shorts.avif","monaco shorts.avif"
];

const boots = [
"f50 elite.jpg","pedri predator.jpg","yamal f50.jpg","jude.jpg","copa pure 3.jpg",
"x speedflow.jpg","mecurial.jpg","neymar puma.jpg"
];

const mem = [
"pedri signed.jpg","pedri 2.jpg","ms1.webp","ms2.jpg","yamal card.jpg","yamal card 2.jpg"
];

// ================= CREATE ITEMS =================
function loadItems(list,id,price){
    let container=document.getElementById(id);
    list.forEach(img=>{
        container.innerHTML+=`
        <div class="card">
            <img src="${img}">
            <h4>${img.split('.')[0]}</h4>
            <p class="price">€${price}</p>
            <button class="btn" onclick="add(this,'${img}',${price})">Add</button>
        </div>`;
    });
}
loadItems(shirts,"shirts",80);
loadItems(shorts,"shorts",50);
loadItems(boots,"boots",130);
loadItems(mem,"mem",250);

// ================= SCROLL =================
function scrollRow(id,amt){ document.getElementById(id).scrollBy({left:amt,behavior:'smooth'}); }

// ================= CART =================
let cart=[];
function add(btn,name,price){
    btn.innerText="✓ Added";
    setTimeout(()=>btn.innerText="Add",700);
    cart.push({name,price});
    render();
}
function render(){
    let html='',total=0;
    cart.forEach(i=>{ total+=i.price; html+=`<div class="cart-item">${i.name} €${i.price}</div>`; });
    document.getElementById("items").innerHTML=html;
    document.getElementById("total").innerText=total;
    document.getElementById("count").innerText=cart.length;
}
function toggleCart(){ document.getElementById("cartPanel").classList.toggle("show"); }
</script>

</body>
</html>
