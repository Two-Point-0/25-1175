<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Locker-Room | Shop</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* BACKGROUND */
body::before{
content:"";
position:fixed;
width:100%;
height:100%;
z-index:-2;
background-size:cover;
animation:bg 25s infinite;
}
@keyframes bg{
0%{background:url('locker1.jpg')}
25%{background:url('locker2.jpg')}
50%{background:url('locker3.jpg')}
75%{background:url('locker4.jpg')}
100%{background:url('locker5.jpg')}
}

body::after{
content:"";
position:fixed;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
z-index:-1;
}

body{font-family:Inter; margin:0; color:#fff;}

/* MENU */
.menu-bar{
display:flex;
justify-content:center;
gap:15px;
padding:15px;
}
.menu-bar a{
padding:8px 16px;
border-radius:20px;
background:rgba(0,0,0,0.5);
color:white;
text-decoration:none;
}

/* GRID */
.section-title{
text-align:center;
color:#e6b17e;
margin-top:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:20px;
padding:20px;
}

.card{
background:rgba(0,0,0,0.5);
padding:10px;
border-radius:15px;
text-align:center;
}
.card img{
width:100%;
border-radius:10px;
}
.price{color:#f3b44f;}
.card button{
background:#e6b17e;
border:none;
padding:5px;
border-radius:10px;
cursor:pointer;
}

/* CART */
#cart{
position:fixed;
right:0;
top:0;
width:300px;
height:100%;
background:#111;
padding:20px;
transform:translateX(100%);
transition:0.3s;
}
#cart.show{transform:translateX(0);}

.cart-item{
display:flex;
gap:10px;
margin-bottom:10px;
}
.cart-item img{width:40px;}

</style>
</head>

<body>

<div class="menu-bar">
<a href="index.html">Home</a>
<a href="shop.html">Shop</a>
<a href="size.html">Size</a>
<a href="#" onclick="toggleCart()">Cart (<span id="cart-count">0</span>)</a>
</div>

<h2 class="section-title">Shirts</h2>
<div class="grid" id="shirts"></div>

<h2 class="section-title">Shorts</h2>
<div class="grid" id="shorts"></div>

<h2 class="section-title">Boots</h2>
<div class="grid" id="boots"></div>

<h2 class="section-title">Memorabilia</h2>
<div class="grid" id="memo"></div>

<!-- CART -->
<div id="cart">
<h3>Cart</h3>
<div class="cart-items"></div>
<p>Total €<span id="total">0</span></p>
</div>

<script>

/* 🔥 PRODUCTS (ALL YOUR 54 ITEMS) */

const shirts=[
["Barcelona Shirt",80,"barca.png"],
["Madrid Shirt",80,"madrid.avif"],
["Liverpool Shirt",80,"liverpool.avif"],
["City Shirt",80,"city.avif"],
["Arsenal Shirt",80,"arsenal.avif"],
["Chelsea Shirt",80,"chelsea.avif"],
["PSG Shirt",80,"psg.avif"],
["Juventus Shirt",80,"juventus.avif"],
["AC Milan Shirt",80,"AC Milan.jpg"],
["Inter Shirt",80,"inter.avif"],
["Napoli Shirt",80,"napoli.webp"],
["Bayern Shirt",80,"bayern.avif"],
["Borussia Shirt",80,"borussia.avif"],
["RB Shirt",80,"RB.avif"],
["Leverkusen Shirt",80,"leverkusen.avif"],
["Athletico Shirt",80,"athletico.jpg"],
["Sevilla Shirt",80,"sevila.jpg"],
["Olympique Shirt",80,"olympique.avif"],
["Lyon Shirt",80,"lyon.avif"],
["Monaco Shirt",80,"monaco.avif"]
];

const shorts=[
["Barcelona Shorts",50,"barcelona shorts.avif"],
["Madrid Shorts",50,"madrid shorts.webp"],
["Liverpool Shorts",50,"liverpool shorts.avif"],
["City Shorts",50,"city shorts.avif"],
["Arsenal Shorts",50,"arsenal shorts.webp"],
["Chelsea Shorts",50,"chelsea shorts.avif"],
["PSG Shorts",50,"psg shorts.avif"],
["Juventus Shorts",50,"juventus shorts.avif"],
["AC Milan Shorts",50,"AcMilan shorts.avif"],
["Inter Shorts",50,"inter shorts.avif"],
["Napoli Shorts",50,"napoli shorts.webp"],
["Bayern Shorts",50,"bayern shorts.avif"],
["Borussia Shorts",50,"borussia shorts.avif"],
["RB Shorts",50,"RB shorts.avif"],
["Leverkusen Shorts",50,"leverkusen shorts.avif"],
["Athletico Shorts",50,"athletico shorts.webp"],
["Sevilla Shorts",50,"sevila short.avif"],
["Olympique Shorts",50,"olympique shorts.avif"],
["Lyon Shorts",50,"lyon shorts.avif"],
["Monaco Shorts",50,"monaco shorts.avif"]
];

const boots=[
["F50 Elite",120,"f50 elite.jpg"],
["Pedri Predator",130,"pedri predator.jpg"],
["Yamal F50",120,"yamal f50.jpg"],
["Jude Boot",110,"jude.jpg"],
["Copa Pure 3",140,"copa pure 3.jpg"],
["X Speedflow",135,"x speedflow.jpg"],
["Mercurial",140,"mecurial.jpg"],
["Neymar Puma",150,"neymar puma.jpg"]
];

const memo=[
["Pedri Signed",250,"pedri signed.jpg"],
["Pedri Memorabilia",220,"pedri 2.jpg"],
["Messi 1",300,"ms1.webp"],
["Messi 2",320,"ms2.jpg"],
["Yamal Card",180,"yamal card.jpg"],
["Yamal Card 2",190,"yamal card 2.jpg"]
];

/* 🔥 RENDER FUNCTION */
function render(section,id){
let container=document.getElementById(id);
section.forEach(item=>{
container.innerHTML+=`
<div class="card">
<img src="${item[2]}">
<h4>${item[0]}</h4>
<p class="price">€${item[1]}</p>
<button onclick="add('${item[0]}',${item[1]},'${item[2]}')">Add</button>
</div>`;
});
}

render(shirts,"shirts");
render(shorts,"shorts");
render(boots,"boots");
render(memo,"memo");

/* CART */
let cart=[];
function add(name,price,img){
let size=localStorage.getItem("selectedSize");
if(!size){alert("Select size first");return;}

cart.push({name,price,img,size});
update();
}

function update(){
let c=document.querySelector(".cart-items");
c.innerHTML="";
let total=0;

cart.forEach((i,x)=>{
total+=i.price;
c.innerHTML+=`
<div class="cart-item">
<img src="${i.img}">
<div>${i.name}<br>Size:${i.size}</div>
<button onclick="remove(${x})">X</button>
</div>`;
});

document.getElementById("total").innerText=total;
document.getElementById("cart-count").innerText=cart.length;
}

function remove(i){cart.splice(i,1);update();}
function toggleCart(){document.getElementById("cart").classList.toggle("show");}

</script>

</body>
</html>
