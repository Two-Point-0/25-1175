<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Locker-Room | Shop</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {margin:0;font-family:Arial;color:white;}

/* BACKGROUND */
.bg div {
    position:fixed;width:100%;height:100%;
    background-size:cover;background-position:center;
    opacity:0;transition:1.5s;z-index:-2;
}
.bg .active {opacity:1;}
.overlay {
    position:fixed;width:100%;height:100%;
    background:rgba(0,0,0,0.6);z-index:-1;
}

/* MENU */
.menu-bar {
    display:flex;justify-content:center;gap:15px;padding:15px;
}
.menu-bar a {
    color:white;text-decoration:none;
    padding:8px 16px;border-radius:20px;
    background:rgba(0,0,0,0.5);
}

/* SECTIONS */
.section {margin:40px 20px;}
.section h2 {color:#e6b17e;}

.row {display:flex;align-items:center;}
.container {
    display:flex;overflow-x:auto;gap:15px;padding:10px;
    scroll-behavior:smooth;
}
.container::-webkit-scrollbar {display:none;}

/* CARD */
.card {
    min-width:180px;
    background:rgba(0,0,0,0.6);
    border-radius:15px;
    padding:10px;text-align:center;
    transition:0.3s;
}
.card:hover {transform:scale(1.05);}
.card img {width:100%;border-radius:10px;}

.price {color:#f3b44f;font-weight:bold;}

/* ADD BUTTON (INTERACTIVE) */
.btn {
    margin-top:6px;
    padding:8px;
    border:none;
    border-radius:20px;
    background:linear-gradient(135deg,#e6b17e,#f3c17f);
    cursor:pointer;
    transition:0.2s;
}
.btn:active {
    transform:scale(0.9);
}

/* FLOATING CART BUTTON */
.cart-float {
    position:fixed;
    bottom:20px;
    right:20px;
    background:#e6b17e;
    color:black;
    width:60px;height:60px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:1.4rem;
    cursor:pointer;
    box-shadow:0 0 15px rgba(0,0,0,0.6);
}
.cart-count {
    position:absolute;
    top:-5px;right:-5px;
    background:red;
    color:white;
    border-radius:50%;
    padding:4px 7px;
    font-size:0.7rem;
}

/* POPUP CART */
#cartPanel {
    position:fixed;
    right:-320px;
    top:0;
    width:320px;
    height:100%;
    background:#111;
    padding:15px;
    transition:0.3s;
}
#cartPanel.show {right:0;}

.cart-item {
    display:flex;
    justify-content:space-between;
    margin:8px 0;
}
.total {margin-top:10px;font-weight:bold;}

.scroll-btn {
    width:40px;height:40px;
    border:none;border-radius:50%;
    background:#e6b17e;
    cursor:pointer;
}
</style>
</head>

<body>

<!-- BACKGROUND -->
<div class="bg">
<div class="active" style="background-image:url('locker1.jpg')"></div>
<div style="background-image:url('locker2.jpg')"></div>
<div style="background-image:url('locker3.jpg')"></div>
<div style="background-image:url('locker4.jpg')"></div>
</div>
<div class="overlay"></div>

<!-- MENU -->
<div class="menu-bar">
<a href="index.html">Home</a>
<a href="shop.html">Shop</a>
<a href="size.html">Size Guide</a>
<a href="videos.html">Videos</a>
<a href="contact.html">Contact</a>
</div>

<!-- ================= SHIRTS ================= -->
<div class="section">
<h2>Shirts</h2>
<div class="row">
<button class="scroll-btn" onclick="scrollRow('shirts',-300)">‹</button>
<div class="container" id="shirts"></div>
<button class="scroll-btn" onclick="scrollRow('shirts',300)">›</button>
</div>
</div>

<!-- ================= SHORTS ================= -->
<div class="section">
<h2>Shorts</h2>
<div class="row">
<button class="scroll-btn" onclick="scrollRow('shorts',-300)">‹</button>
<div class="container" id="shorts"></div>
<button class="scroll-btn" onclick="scrollRow('shorts',300)">›</button>
</div>
</div>

<!-- ================= BOOTS ================= -->
<div class="section">
<h2>Boots</h2>
<div class="row">
<button class="scroll-btn" onclick="scrollRow('boots',-300)">‹</button>
<div class="container" id="boots"></div>
<button class="scroll-btn" onclick="scrollRow('boots',300)">›</button>
</div>
</div>

<!-- ================= MEM ================= -->
<div class="section">
<h2>Memorabilia</h2>
<div class="row">
<button class="scroll-btn" onclick="scrollRow('mem',-300)">‹</button>
<div class="container" id="mem"></div>
<button class="scroll-btn" onclick="scrollRow('mem',300)">›</button>
</div>
</div>

<!-- FLOATING CART -->
<div class="cart-float" onclick="toggleCart()">
<i class="fas fa-shopping-cart"></i>
<div class="cart-count" id="count">0</div>
</div>

<!-- CART PANEL -->
<div id="cartPanel">
<h3>🛒 Your Cart</h3>
<div id="items"></div>
<p class="total">Total: €<span id="total">0</span></p>
</div>

<script>
// DATA (ALL 54 IMAGES)
const shirts = ["barca.png","madrid.avif","liverpool.avif","city.avif","arsenal.avif","chelsea.avif","psg.avif","juventus.avif","AC Milan.jpg","inter.avif","napoli.webp","bayern.avif","borussia.avif","RB.avif","leverkusen.avif","athletico.jpg","sevila.jpg","olympique.avif","lyon.avif","monaco.avif"];

const shorts = ["barcelona shorts.avif","madrid shorts.webp","liverpool shorts.avif","city shorts.avif","arsenal shorts.webp","chelsea shorts.avif","psg shorts.avif","juventus shorts.avif","AcMilan shorts.avif","inter shorts.avif","napoli shorts.webp","bayern shorts.avif","borussia shorts.avif","RB shorts.avif","leverkusen shorts.avif","athletico shorts.webp","sevila short.avif","olympique shorts.avif","lyon shorts.avif","monaco shorts.avif"];

const boots = ["f50 elite.jpg","pedri predator.jpg","yamal f50.jpg","jude.jpg","copa pure 3.jpg","x speedflow.jpg","mecurial.jpg","neymar puma.jpg"];

const mem = ["pedri signed.jpg","pedri 2.jpg","ms1.webp","ms2.jpg","yamal card.jpg","yamal card 2.jpg"];

// CREATE ITEMS
function loadItems(list,id,price){
let container=document.getElementById(id);
list.forEach(img=>{
container.innerHTML+=`
<div class="card">
<img src="${img}">
<h4>${img.split('.')[0]}</h4>
<p class="price">€${price}</p>
<button class="btn" onclick="add(this,'${img}',${price})">Add</button>
</div>`;
});
}
loadItems(shirts,"shirts",80);
loadItems(shorts,"shorts",50);
loadItems(boots,"boots",130);
loadItems(mem,"mem",250);

// SCROLL
function scrollRow(id,amt){
document.getElementById(id).scrollBy({left:amt,behavior:'smooth'});
}

// CART
let cart=[];
function add(btn,name,price){
btn.innerText="✓ Added";
setTimeout(()=>btn.innerText="Add",800);

cart.push({name,price});
render();
}

function render(){
let html='',total=0;
cart.forEach(i=>{
total+=i.price;
html+=`<div class="cart-item">${i.name} €${i.price}</div>`;
});
document.getElementById("items").innerHTML=html;
document.getElementById("total").innerText=total;
document.getElementById("count").innerText=cart.length;
}

function toggleCart(){
document.getElementById("cartPanel").classList.toggle("show");
}

// BACKGROUND
let slides=document.querySelectorAll('.bg div');
let i=0;
setInterval(()=>{
slides[i].classList.remove('active');
i=(i+1)%slides.length;
slides[i].classList.add('active');
},4000);
</script>

</body>
</html>
