<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Locker-Room | Shop</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:#0a0c10;color:#eee;overflow-x:hidden;}
html{scrollbar-width:none;}html::-webkit-scrollbar{display:none;}

.menu-bar{display:flex;justify-content:center;gap:15px;padding:15px;background:rgba(0,0,0,0.7);backdrop-filter:blur(12px);position:sticky;top:0;z-index:100;flex-wrap:wrap;}
.menu-bar a{color:white;text-decoration:none;font-weight:bold;padding:8px 20px;border-radius:40px;display:flex;align-items:center;gap:8px;transition:0.3s;background:rgba(255,255,255,0.05);}
.menu-bar a:hover{background:#e6b17e;color:black;}
.menu-bar a.active{background:#e6b17e;color:black;}

.hero{text-align:center;margin:30px 0;}
.hero h1{font-size:2.5rem;background:linear-gradient(135deg,#e6b17e,#ffda9e);-webkit-background-clip:text;background-clip:text;color:transparent;}

.section-title{text-align:center;margin:35px 0 20px;color:#e6b17e;font-size:1.8rem;}
.scroll-wrapper{display:flex;align-items:center;gap:10px;padding:0 20px;}
.scroll-container{display:flex;overflow-x:auto;gap:20px;padding:10px;scroll-behavior:smooth;scrollbar-width:none;}
.scroll-container::-webkit-scrollbar{display:none;}
.scroll-item{min-width:180px;max-width:180px;background:rgba(20,22,27,0.85);border-radius:20px;padding:12px;text-align:center;transition:0.3s;border:1px solid rgba(230,177,126,0.3);}
.scroll-item:hover{transform:translateY(-5px);border-color:#e6b17e;}
.scroll-item img{width:100%;border-radius:15px;margin-bottom:8px;aspect-ratio:1/1;object-fit:cover;}
.item-name{font-weight:600;font-size:0.85rem;margin:5px 0;}
.item-price{font-weight:700;color:#e6b17e;margin-bottom:8px;}
.add-btn{padding:6px 12px;border:none;border-radius:30px;background:#e6b17e;color:black;font-weight:bold;cursor:pointer;width:100%;display:flex;align-items:center;justify-content:center;gap:5px;}
.add-btn:hover{background:#f5cb9c;}
.scroll-btn{background:#e6b17e;border:none;border-radius:50%;width:40px;height:40px;cursor:pointer;font-size:1.3rem;flex-shrink:0;}
.cart-badge{position:fixed;bottom:25px;right:25px;background:#e6b17e;width:55px;height:55px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.5rem;cursor:pointer;z-index:1100;box-shadow:0 5px 15px rgba(0,0,0,0.3);border:none;}
.cart-badge span{position:absolute;top:-5px;right:-5px;background:#ff4d4d;color:white;border-radius:50%;width:22px;height:22px;font-size:0.7rem;display:flex;align-items:center;justify-content:center;}
.cart-popup{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0.9);background:#111;padding:20px;border-radius:25px;width:340px;z-index:2000;transition:0.2s;opacity:0;visibility:hidden;border:1px solid #e6b17e;}
.cart-popup.show{transform:translate(-50%,-50%) scale(1);opacity:1;visibility:visible;}
.cart-items{max-height:250px;overflow:auto;margin:10px 0;}
.cart-item{display:flex;justify-content:space-between;margin-bottom:8px;background:#1e212a;padding:8px 12px;border-radius:15px;}
.cart-item button{background:#ff5e6e;border:none;color:white;border-radius:20px;padding:2px 10px;cursor:pointer;}
.total-row{font-size:1.2rem;font-weight:bold;margin:10px 0;text-align:right;}
.checkout-btn{width:100%;padding:10px;background:#e6b17e;border:none;border-radius:25px;font-weight:bold;cursor:pointer;}
.close-cart{position:absolute;top:10px;right:15px;font-size:1.3rem;cursor:pointer;color:#aaa;}
.footer-locker{text-align:center;background:rgba(0,0,0,0.6);padding:20px;color:white;margin-top:40px;font-size:0.75rem;}
</style>
</head>
<body>

<div class="menu-bar">
    <a href="index.html"><i class="fas fa-house"></i> Home</a>
    <a href="shop.html" class="active"><i class="fas fa-bag-shopping"></i> Shop</a>
    <a href="size.html"><i class="fas fa-ruler"></i> Size Guide</a>
    <a href="videos.html"><i class="fas fa-video"></i> Videos</a>
    <a href="contact.html"><i class="fas fa-phone"></i> Contact</a>
</div>

<div class="hero">
    <h1>⚡ THE LOCKER-ROOM ⚡</h1>
    <p>Premium Football Gear</p>
</div>

<!-- Shirts Section -->
<h2 class="section-title"><i class="fas fa-tshirt"></i> Shirts</h2>
<div class="scroll-wrapper">
    <button class="scroll-btn" onclick="scrollRow('shirtsRow', -320)">‹</button>
    <div id="shirtsRow" class="scroll-container"></div>
    <button class="scroll-btn" onclick="scrollRow('shirtsRow', 320)">›</button>
</div>

<!-- Shorts Section -->
<h2 class="section-title"><i class="fas fa-shorts"></i> Shorts</h2>
<div class="scroll-wrapper">
    <button class="scroll-btn" onclick="scrollRow('shortsRow', -320)">‹</button>
    <div id="shortsRow" class="scroll-container"></div>
    <button class="scroll-btn" onclick="scrollRow('shortsRow', 320)">›</button>
</div>

<!-- Boots Section -->
<h2 class="section-title"><i class="fas fa-shoe-prints"></i> Boots & Memorabilia</h2>
<div class="scroll-wrapper">
    <button class="scroll-btn" onclick="scrollRow('bootsRow', -320)">‹</button>
    <div id="bootsRow" class="scroll-container"></div>
    <button class="scroll-btn" onclick="scrollRow('bootsRow', 320)">›</button>
</div>

<button class="cart-badge" id="cartBtn"><i class="fas fa-shopping-cart"></i><span id="cartCount">0</span></button>

<div id="cartModal" class="cart-popup">
    <span class="close-cart" id="closeCart">&times;</span>
    <h3>Your Cart</h3>
    <div id="cartItems" class="cart-items"></div>
    <div class="total-row">Total: €<span id="cartTotal">0</span></div>
    <button class="checkout-btn" id="checkoutBtn">Checkout</button>
</div>

<footer class="footer-locker">
    ⚽ THE LOCKER-ROOM - OFFICIAL UEFA MERCHANDISE PARTNER ⚽<br>
    © 2026 The Locker-Room | Muthithi Road, Westlands, Nairobi, Kenya
</footer>

<script>
// Product Data
const shirts = [
    {name:"Barcelona Shirt",price:80,img:"https://placehold.co/300x300/1e2a3a/e6b17e?text=Barca"},
    {name:"Madrid Shirt",price:80,img:"https://placehold.co/300x300/2a2a2a/e6b17e?text=Madrid"},
    {name:"Liverpool Shirt",price:80,img:"https://placehold.co/300x300/c41e3a/e6b17e?text=Liverpool"},
    {name:"City Shirt",price:80,img:"https://placehold.co/300x300/6caddf/e6b17e?text=City"},
    {name:"Arsenal Shirt",price:80,img:"https://placehold.co/300x300/ef0107/e6b17e?text=Arsenal"},
    {name:"Chelsea Shirt",price:80,img:"https://placehold.co/300x300/034694/e6b17e?text=Chelsea"},
    {name:"PSG Shirt",price:80,img:"https://placehold.co/300x300/002654/e6b17e?text=PSG"},
    {name:"Juventus Shirt",price:80,img:"https://placehold.co/300x300/000000/e6b17e?text=Juventus"},
    {name:"Inter Shirt",price:80,img:"https://placehold.co/300x300/0a3a82/e6b17e?text=Inter"},
    {name:"Bayern Shirt",price:80,img:"https://placehold.co/300x300/dc052d/e6b17e?text=Bayern"},
    {name:"Borussia Shirt",price:80,img:"https://placehold.co/300x300/fde100/e6b17e?text=Dortmund"},
    {name:"AC Milan Shirt",price:80,img:"https://placehold.co/300x300/fb0a2c/e6b17e?text=Milan"},
    {name:"Napoli Shirt",price:80,img:"https://placehold.co/300x300/1b4d8c/e6b17e?text=Napoli"},
    {name:"Leverkusen Shirt",price:80,img:"https://placehold.co/300x300/e32219/e6b17e?text=Leverkusen"},
    {name:"Sevilla Shirt",price:80,img:"https://placehold.co/300x300/ffffff/e6b17e?text=Sevilla"},
    {name:"Lyon Shirt",price:80,img:"https://placehold.co/300x300/1c3a6b/e6b17e?text=Lyon"},
    {name:"Monaco Shirt",price:80,img:"https://placehold.co/300x300/e31836/e6b17e?text=Monaco"},
    {name:"RB Shirt",price:80,img:"https://placehold.co/300x300/2e6b3e/e6b17e?text=RB"},
    {name:"Athletico Shirt",price:80,img:"https://placehold.co/300x300/cb2f2f/e6b17e?text=Atletico"},
    {name:"Olympique Shirt",price:80,img:"https://placehold.co/300x300/107a8b/e6b17e?text=Marseille"}
];

const shorts = [
    {name:"Barcelona Shorts",price:45,img:"https://placehold.co/300x300/1e2a3a/e6b17e?text=Barca+Shorts"},
    {name:"Madrid Shorts",price:45,img:"https://placehold.co/300x300/2a2a2a/e6b17e?text=Madrid+Shorts"},
    {name:"Liverpool Shorts",price:45,img:"https://placehold.co/300x300/c41e3a/e6b17e?text=Liverpool+Shorts"},

    {name:"Chelsea Shorts",price:45,img:"https://placehold.co/300x300/034694/e6b17e?text=Chelsea+Shorts"},
    {name:"PSG Shorts",price:45,img:"https://placehold.co/300x300/002654/e6b17e?text=PSG+Shorts"},
    {name:"Juventus Shorts",price:45,img:"https://placehold.co/300x300/000000/e6b17e?text=Juventus+Shorts"},
    {name:"Inter Shorts",price:45,img:"https://placehold.co/300x300/0a3a82/e6b17e?text=Inter+Shorts"},
    {name:"Bayern Shorts",price:45,img:"https://placehold.co/300x300/dc052d/e6b17e?text=Bayern+Shorts"}
];

const boots = [
    {name:"adidas F50 Elite",price:229,img:"https://placehold.co/300x300/4a90e2/e6b17e?text=F50"},
    {name:"Mercurial Vapor",price:249,img:"https://placehold.co/300x300/f39c12/e6b17e?text=Mercurial"},
    {name:"Predator Elite",price:209,img:"https://placehold.co/300x300/e67e22/e6b17e?text=Predator"},
    {name:"Neymar Puma",price:219,img:"https://placehold.co/300x300/2ecc71/e6b17e?text=Neymar"},
    {name:"Pedri Signed Jersey",price:349,img:"https://placehold.co/300x300/9b59b6/e6b17e?text=Pedri+Signed"},
    {name:"Yamal RC Card",price:79,img:"https://placehold.co/300x300/3498db/e6b17e?text=Yamal+Card"},
    {name:"MSN Signed Print",price:159,img:"https://placehold.co/300x300/e74c3c/e6b17e?text=MSN"}
];

function renderProducts(containerId, products) {
    const container = document.getElementById(containerId);
    container.innerHTML = '';
    products.forEach(p => {
        const div = document.createElement('div');
        div.className = 'scroll-item';
        div.innerHTML = `
            <img src="${p.img}" alt="${p.name}">
            <div class="item-name">${p.name}</div>
            <div class="item-price">€${p.price}</div>
            <button class="add-btn" onclick="addToCart('${p.name}', ${p.price})"><i class="fas fa-cart-plus"></i> Add</button>
        `;
        container.appendChild(div);
    });
}

let cart = [];

function addToCart(name, price) {
    cart.push({name, price});
    updateCartUI();
    document.getElementById('cartModal').classList.add('show');
}

function updateCartUI() {
    const container = document.getElementById('cartItems');
    const totalSpan = document.getElementById('cartTotal');
    const countSpan = document.getElementById('cartCount');
    let total = 0;
    container.innerHTML = '';
    cart.forEach((item, i) => {
        total += item.price;
        container.innerHTML += `<div class="cart-item">${item.name} €${item.price}<button onclick="removeItem(${i})">X</button></div>`;
    });
    totalSpan.innerText = total;
    countSpan.innerText = cart.length;
}

function removeItem(index) {
    cart.splice(index, 1);
    updateCartUI();
}

function checkout() {
    if(cart.length === 0) { alert("Cart is empty!"); return; }
    alert("✅ Payment Successful! Thank you for shopping at THE LOCKER-ROOM!");
    cart = [];
    updateCartUI();
    document.getElementById('cartModal').classList.remove('show');
}

function scrollRow(id, amount) {
    document.getElementById(id).scrollBy({left: amount, behavior: 'smooth'});
}

renderProducts('shirtsRow', shirts);
renderProducts('shortsRow', shorts);
renderProducts('bootsRow', boots);

document.getElementById('cartBtn').onclick = () => document.getElementById('cartModal').classList.add('show');
document.getElementById('closeCart').onclick = () => document.getElementById('cartModal').classList.remove('show');
document.getElementById('checkoutBtn').onclick = checkout;
</script>
</body>
</html>
