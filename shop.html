<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Locker-Room | Shop</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif}
body{background:#111;color:#fff;overflow-x:hidden}

/* MENU BAR (MATCH HOME) */
.menu-bar{
 display:flex;justify-content:center;gap:20px;padding:15px;
 background:rgba(0,0,0,0.6);backdrop-filter:blur(10px);
 position:sticky;top:0;z-index:100
}
.menu-bar a{
 color:#fff;text-decoration:none;font-weight:bold;
 display:flex;align-items:center;gap:6px;
 padding:8px 16px;border-radius:20px;transition:.3s
}
.menu-bar a:hover{background:#e6b17e;color:#000}

.section{margin:30px 0}
.section h2{text-align:center;margin-bottom:10px;color:#e6b17e}

.scroll-wrapper{
 display:flex;align-items:center;gap:10px;padding:0 10px
}

.scroll{
 display:flex;overflow:hidden;gap:15px;padding:10px;
 scroll-behavior:smooth;width:100%
}

.card{
 min-width:180px;max-width:180px;background:#1c1c1c;
 border-radius:15px;padding:10px;text-align:center;flex-shrink:0
}
.card img{width:100%;border-radius:10px}
.card h4{font-size:.9rem;margin:5px 0}
.price{color:#e6b17e;font-weight:bold}
button{
 margin-top:5px;padding:6px 10px;border:none;border-radius:10px;
 background:#e6b17e;color:#000;cursor:pointer;font-weight:bold
}
button:hover{background:#f3c17f}

.scroll-btn{
 background:#e6b17e;border:none;border-radius:50%;
 width:40px;height:40px;cursor:pointer;font-size:1.2rem
}

/* CART POPUP */
#cart{
 position:fixed;top:50%;left:50%;
 transform:translate(-50%,-50%) scale(0);
 width:340px;background:#000;padding:20px;border-radius:15px;
 z-index:200;transition:.3s
}
#cart.active{transform:translate(-50%,-50%) scale(1)}
.cart-items{max-height:200px;overflow-y:auto}
.cart-item{display:flex;justify-content:space-between;margin:5px 0}

.footer-locker{
 text-align:center;background:rgba(0,0,0,0.4);
 padding:15px 10px;color:white;margin-top:30px
}
</style>
</head>

<body>

<div class="menu-bar">
<a href="index.html"><i class="fas fa-house"></i> Home</a>
<a href="shop.html"><i class="fas fa-bag-shopping"></i> Shop</a>
<a href="size.html"><i class="fas fa-ruler"></i> Size Guide</a>
<a href="videos.html"><i class="fas fa-video"></i> Videos</a>
<a href="contact.html"><i class="fas fa-phone"></i> Contact</a>
</div>

<!-- SECTION TEMPLATE -->
<script>
function createSection(title,id){
 document.write(`
 <div class="section">
 <h2>${title}</h2>
 <div class="scroll-wrapper">
 <button class="scroll-btn" onclick="scrollLeft('${id}')"><i class="fas fa-chevron-left"></i></button>
 <div class="scroll" id="${id}"></div>
 <button class="scroll-btn" onclick="scrollRight('${id}')"><i class="fas fa-chevron-right"></i></button>
 </div>
 </div>
 `);
}
</script>

<script>
createSection('Shirts','shirts');
createSection('Shorts','shorts');
createSection('Boots','boots');
createSection('Memorabilia','mem');
</script>

<div id="cart">
<h3>Your Cart</h3>
<div class="cart-items"></div>
<p>Total: €<span id="total">0</span></p>
<button onclick="checkout()">Checkout</button>
</div>

<div class="footer-locker">
⚽ THE LOCKER-ROOM - OFFICIAL UEFA MERCHANDISE PARTNER ⚽<br>
© 2026 The Locker-Room | Muthithi Road, Westlands, Nairobi, Kenya<br>
📞 24/7 Support: +254 700 123 456 | ✉️ info@thelocker-room.co.ke
</div>

<script>

const shirts=["barca.png","madrid.avif","liverpool.avif","city.avif","arsenal.avif","chelsea.avif","psg.avif","juventus.avif","AC Milan.jpg","inter.avif","napoli.webp","bayern.avif","borussia.avif","RB.avif","leverkusen.avif","athletico.jpg","sevila.jpg","monaco.avif"];

const shorts=["barcelona shorts.avif","madrid shorts.webp","liverpool shorts.avif","city shorts.avif","arsenal shorts.webp","chelsea shorts.avif","psg shorts.avif","juventus shorts.avif","AcMilan shorts.avif","inter shorts.avif","napoli shorts.webp","bayern shorts.avif","borussia shorts.avif","RB shorts.avif","leverkusen shorts.avif","athletico shorts.webp","sevila short.avif","monaco shorts.avif"];

const boots=["f50 elite.jpg","pedri predator.jpg","yamal f50.jpg","jude.jpg","copa pure 3.jpg","x speedflow.jpg","mecurial.jpg","neymar puma.jpg"];

const mem=["pedri signed.jpg","pedri 2.jpg","ms1.webp","ms2.jpg","yamal card.jpg","yamal card 2.jpg","messi frame.jpg","ronaldo frame.jpg","ucl ball.jpg","worldcup.jpg"];

function loadItems(arr,id,price){
 const container=document.getElementById(id);
 arr.forEach(img=>{
  const div=document.createElement('div');
  div.className='card';
  div.innerHTML=`<img src="${img}"><h4>${img}</h4><p class='price'>€${price}</p><button onclick="add('${img}',${price})">Add to Cart</button>`;
  container.appendChild(div);
 });
}

loadItems(shirts,'shirts',80);
loadItems(shorts,'shorts',50);
loadItems(boots,'boots',120);
loadItems(mem,'mem',200);

function scrollLeft(id){
 document.getElementById(id).scrollBy({left:-300,behavior:'smooth'});
}
function scrollRight(id){
 document.getElementById(id).scrollBy({left:300,behavior:'smooth'});
}

let cart=[];
function add(name,price){
 cart.push({name,price});
 document.getElementById('cart').classList.add('active');
 render();
}

function render(){
 const box=document.querySelector('.cart-items');
 box.innerHTML='';let total=0;
 cart.forEach(i=>{
  total+=i.price;
  box.innerHTML+=`<div class='cart-item'>${i.name} €${i.price}</div>`;
 });
 document.getElementById('total').innerText=total;
}

function checkout(){
 if(cart.length===0)return alert('Cart is empty');
 alert('OTP sent to +254724726032 (Demo Payment Successful)');
 cart=[];
 render();
 document.getElementById('cart').classList.remove('active');
}

</script>

</body>
</html>
