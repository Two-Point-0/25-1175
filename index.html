<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Locker-Room | Home</title>

<style>
/* Background Slideshow */
.slideshow-container {
    position: fixed;
    width: 100%;
    height: 100%;
    top: 0;
    left: 0;
    z-index: -2;
}

.slide {
    position: absolute;
    width: 100%;
    height: 100%;
    background-size: cover;
    background-position: center;
    opacity: 0;
    transition: opacity 1.5s ease-in-out;
}

.slide.active {
    opacity: 1;
}

/* Dark overlay */
.slideshow-overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
    top: 0;
    left: 0;
    z-index: -1;
}

/* Menu */
.menu-bar {
    display: flex;
    justify-content: center;
    gap: 20px;
    padding: 15px;
    background: rgba(0,0,0,0.7);
}

.menu-bar a {
    color: white;
    text-decoration: none;
    font-weight: bold;
}

/* Feature Boxes */
.feature-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
    padding: 50px;
}

.feature-box {
    background: rgba(0,0,0,0.6);
    padding: 20px;
    border-radius: 20px;
    color: white;
    text-align: center;
}

/* Footer */
.footer-locker {
    text-align: center;
    padding: 20px;
    background: rgba(0,0,0,0.8);
    color: white;
}
</style>
</head>

<body>

<!-- Background -->
<div class="slideshow-container">
    <div class="slide active" style="background-image: url('locker1.jpg');"></div>
    <div class="slide" style="background-image: url('locker2.jpg');"></div>
    <div class="slide" style="background-image: url('locker3.jpg');"></div>
    <div class="slide" style="background-image: url('locker4.jpg');"></div>
    <div class="slide" style="background-image: url('locker5.jpg');"></div>
</div>
<div class="slideshow-overlay"></div>

<!-- Header -->
<div class="menu-bar">
    <a href="index.html">🏠 HOME</a>
    <a href="shop.html">🛍️ SHOP</a>
    <a href="size.html">📏 SIZE GUIDE</a>
    <a href="videos.html">🎬 VIDEOS</a>
    <a href="contact.html">📞 CONTACT</a>
</div>

<!-- Features -->
<div class="feature-grid">
    <div class="feature-box">
        <h3>🔐 20+ Years</h3>
        <p>Trusted football kit store since 2005.</p>
    </div>

    <div class="feature-box">
        <h3>🏆 100% Authentic</h3>
        <p>Official licensed football merchandise.</p>
    </div>

    <div class="feature-box">
        <h3>🚚 Free East Africa Shipping</h3>
        <p>Fast delivery across Kenya and beyond.</p>
    </div>
</div>

<!-- Footer -->
<footer class="footer-locker">
    ⚽ THE LOCKER-ROOM ⚽<br>
    © 2026 Nairobi, Kenya
</footer>

<script>
const slides = document.querySelectorAll('.slide');
let current = 0;

// Ensure first slide is visible instantly
slides[0].classList.add('active');

function nextSlide() {
    slides[current].classList.remove('active');
    current = (current + 1) % slides.length;
    slides[current].classList.add('active');
}

// Change every 4 seconds (faster = smoother feel)
setInterval(nextSlide, 4000);
</script>

</body>
</html>
